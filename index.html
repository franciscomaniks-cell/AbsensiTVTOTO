<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 id="authTitle">LOGIN SYSTEM</h2>
            <div id="authFields">
                <input type="text" id="uUser" placeholder="Username">
                <input type="password" id="uPass" placeholder="Password">
                <input type="password" id="uConfirm" placeholder="Konfirmasi Password" style="display:none;">
            </div>
            <button class="btn-auth" id="mainAuthBtn" onclick="handleAuth()">MASUK</button>
            <div class="auth-links">
                <p id="toggleText">Belum punya akun? <span onclick="showRegister()">Daftar</span></p>
                <p id="forgotLink"><span onclick="showForgot()">Lupa Password?</span></p>
            </div>
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="dash-label">DASHBOARD</div>
                <div class="menu-icon">☰</div>
            </div>
            <nav class="side-nav">
                <div class="nav-item active" onclick="location.href='index.html'">🏠 Home / Absensi</div>
                <div class="nav-item" onclick="location.href='jobdesk.html'">📝 Atur Jobdesk</div>
                <div class="nav-item logout-link" onclick="logout()">🚪 Logout</div>
            </nav>
        </aside>

        <main class="main-screen">
            <div class="content-container">
                <div class="top-row">
                    <div class="logo-box-red">
                        <div class="brand-logo">TV<span>TOTO</span></div>
                    </div>
                    <div class="stat-card ontime">TEPAT WAKTU<br><span id="sOn">0</span></div>
                    <div class="stat-card late">TERLAMBAT<br><span id="sLate">0</span></div>
                    <div class="stat-card missing">BELUM ABSEN<br><span id="sAbs">65</span></div>
                </div>

                <div class="banner-area">
                    <div class="date-box">
                        <div class="day-text" id="pDay">SABTU</div>
                        <div class="date-text" id="pDate">21 FEB 2026</div>
                    </div>
                    <div class="title-text">ABSEN TVTOTO</div>
                </div>

                <div class="control-bar">
                    <select id="sShift">
                        <option value="PAGI">PAGI (07:45)</option>
                        <option value="SHIFT G">SHIFT G (09:45)</option>
                        <option value="SHIFT G2">SHIFT G2 (11:45)</option>
                        <option value="SORE">SORE (15:45)</option>
                        <option value="MALAM">MALAM (21:45)</option>
                    </select>
                    <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
                    <datalist id="staffs"></datalist>
                    <div id="clockDisplay" class="digital-clock">00:00:00</div>
                    <div class="btn-group">
                        <button class="btn btn-blue" onclick="tambahAbsen()">ABSEN</button>
                        <button class="btn btn-yellow" onclick="filterTelat()">CEK TELAT</button>
                        <button class="btn btn-green" onclick="exportData()">CSV</button>
                        <button class="btn btn-red" onclick="resetData()">RESET</button>
                    </div>
                </div>

                <div class="bottom-grid">
                    <div class="table-container">
                        <table id="tblMain">
                            <thead>
                                <tr>
                                    <th>SHIFT</th>
                                    <th>NAMA</th>
                                    <th>TARGET</th>
                                    <th>AKTUAL</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="voice-panel">
                        <div class="voice-header">SYSTEM VOICE LOGS <span onclick="hapusChat()">Clear</span></div>
                        <div class="voice-body" id="chatWrap"></div>
                        <input type="text" id="chatIn" placeholder="Pesan admin...">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
