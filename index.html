<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2>LOGIN SYSTEM</h2>
            <input type="text" id="uUser" placeholder="Username">
            <input type="password" id="uPass" placeholder="Password">
            <button class="btn-auth" onclick="handleAuth()">MASUK</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="mySidebar">
            <div class="sidebar-header">
                <div class="brand-logo">DASHBOARD</div>
                <button class="menu-toggle">☰</button>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item active">🏠 Home / Absensi</a>
                <a href="jobdesk.html" class="nav-item">📝 Atur Jobdesk</a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item logout-link" onclick="logout()">🚪 Logout</a>
            </nav>
        </aside>

        <main class="content-wrapper">
            <div class="layout-grid">
                
                <div class="absensi-panel">
                    <div class="stat-grid">
                        <div class="stat-card ontime"><h4>TEPAT WAKTU</h4><p id="sOn">0</p></div>
                        <div class="stat-card late"><h4>TERLAMBAT</h4><p id="sLate">0</p></div>
                        <div class="stat-card total"><h4>BELUM ABSEN</h4><p id="sAbs">65</p></div>
                    </div>

                    <div class="header-main">
                        <div class="date-panel">
                            <p id="pDay">SABTU</p>
                            <h2 id="pDate">21 FEB 2026</h2>
                        </div>
                        <div class="title-panel">ABSEN TVTOTO</div>
                    </div>

                    <div class="tool-bar">
                        <select id="sShift">
                            <option value="PAGI">PAGI (07:45)</option>
                            <option value="SHIFT G">SHIFT G (09:45)</option>
                            <option value="SORE">SORE (15:45)</option>
                            <option value="MALAM">MALAM (21:45)</option>
                        </select>
                        <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
                        <datalist id="staffs"></datalist>
                        <div id="clockDisplay" class="digital-clock">00:00:00</div>
                        
                        <div class="btn-group">
                            <button class="btn btn-blue" onclick="tambahAbsen()">ABSEN</button>
                            <button class="btn btn-yellow" onclick="filterTelat()">CEK TELAT</button>
                            <button class="btn btn-green" onclick="exportData()">CSV</button>
                            <button class="btn btn-red" onclick="resetData()">RESET</button>
                            <button class="btn btn-gray" onclick="logout()">LOGOUT</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="tblMain">
                            <thead>
                                <tr>
                                    <th>SHIFT</th>
                                    <th>NAMA STAFF</th>
                                    <th>TARGET</th>
                                    <th>AKTUAL</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="voice-logs-panel">
                    <div class="chat-header">
                        <strong>SYSTEM VOICE LOGS</strong>
                        <span class="clear-btn" onclick="hapusChat()">Clear</span>
                    </div>
                    <div class="chat-messages" id="chatWrap"></div>
                    <div class="chat-footer">
                        <input type="text" id="chatIn" placeholder="Pesan admin..." onkeypress="if(event.key==='Enter') sendAdminChat()">
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
