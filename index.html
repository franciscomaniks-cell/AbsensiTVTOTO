<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System v18.7 | PRO VOICE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e3192; --accent: #ffff00; --success: #00ff88; --danger: #ff4d4d; --warning: #ffcc00;
            --glass: rgba(10, 10, 25, 0.96); --border-glass: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; }
        body { margin: 0; padding: 15px; color: #fff; height: 100vh; background: #000 url('background.jpg') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; overflow: hidden; position: relative; }
        
        .logo-box { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 120px; }
        .logo-box img { width: 100%; border-radius: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }

        .main-container { display: grid; grid-template-columns: 1fr 380px; gap: 20px; width: 100%; max-width: 1800px; height: 95vh; padding-top: 10px; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; margin-left: 140px; }
        .stat-card { padding: 12px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); }
        .stat-card h4 { margin: 0; font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; }
        .stat-card p { margin: 5px 0 0; font-size: 1.8rem; font-family: 'Orbitron'; font-weight: 900; }
        .stat-ontime { border-bottom: 4px solid var(--success); color: var(--success); }
        .stat-late { border-bottom: 4px solid var(--danger); color: var(--danger); }
        .stat-absent { border-bottom: 4px solid var(--warning); color: var(--warning); }

        .absensi-section { background: var(--glass); backdrop-filter: blur(30px); border-radius: 25px; padding: 25px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; }
        .header-main { display: flex; margin-bottom: 20px; border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        .date-panel { background: var(--accent); color: #000; padding: 10px 20px; text-align: center; min-width: 160px; }
        .title-panel { background: linear-gradient(90deg, #000, var(--primary)); flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-family: 'Orbitron'; font-weight: 900; letter-spacing: 8px; }

        .tool-bar { display: grid; grid-template-columns: 160px 1fr 160px auto auto auto auto; gap: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; align-items: center; }
        .digital-clock { background: #000; color: #00ff88; border: 1px solid #00ff88; text-align: center; font-family: 'Orbitron'; font-size: 1.2rem; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        
        input, select { height: 50px; border-radius: 8px; border: none; padding: 0 12px; font-weight: 700; background: #fff; color: #000; }
        .btn { height: 50px; padding: 0 15px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-add { background: #007bff; color: #fff; }
        .btn-filter { background: var(--accent); color: #000; }
        .btn-filter.active { background: #ff00ff; color: #fff; }
        .btn-csv { background: var(--success); color: #000; }
        .btn-reset { background: var(--danger); color: #fff; }

        .table-pro-wrap { background: #fff; border-radius: 15px; overflow: hidden; flex-grow: 1; display: flex; flex-direction: column; }
        .table-scroll { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; color: #111; }
        th { background: var(--primary); color: #fff; padding: 15px; position: sticky; top: 0; font-size: 0.7rem; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-weight: 700; }
        .row-late { background: #fff0f0 !important; color: #d63031 !important; }
        .row-ontime { background: #f0fff4 !important; color: #27ae60 !important; }
        .btn-del-pin { background: none; border: none; color: #999; cursor: pointer; font-size: 1.1rem; }

        .sidebar-chat { background: var(--glass); border-radius: 25px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 15px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { background: rgba(255,255,255,0.08); padding: 10px; border-radius: 10px; border-left: 3px solid var(--accent); }
        .bubble-name { color: var(--accent); font-size: 0.65rem; font-weight: 800; }
        .chat-footer { padding: 15px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border-glass); }
        .chat-footer input { width: 100%; height: 40px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--border-glass); padding: 0 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="logo-box"><img src="logo.png" onerror="this.src='logo.jpg';"></div>

<div class="main-container">
    <div class="absensi-section">
        <div class="stat-grid">
            <div class="stat-card stat-ontime"><h4>Tepat Waktu</h4><p id="sOn">0</p></div>
            <div class="stat-card stat-late"><h4>Terlambat</h4><p id="sLate">0</p></div>
            <div class="stat-card stat-absent"><h4>Belum Absen</h4><p id="sAbs">65</p></div>
        </div>

        <div class="header-main">
            <div class="date-panel"><p id="pDay" style="margin:0; font-size:0.6rem; font-weight:800;">SENIN</p><h2 id="pDate">26 JAN 2026</h2></div>
            <div class="title-panel">ABSEN TVTOTO</div>
        </div>

        <div class="tool-bar">
            <select id="sShift">
                <option value="PAGI">PAGI (07:45)</option>
                <option value="SHIFT G">SHIFT G (09:45)</option>
                <option value="SHIFT G2">SHIFT G2 (11:45)</option>
                <option value="SORE">SORE (15:45)</option>
                <option value="MALAM">MALAM (21:45)</option>
            </select>
            <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
            <datalist id="staffs"></datalist>
            <div id="clockDisplay" class="digital-clock">00:00:00</div>
            <button class="btn btn-add" onclick="tambahAbsen()">ABSEN</button>
            <button class="btn btn-filter" id="btnF" onclick="filterTelat()">CEK TELAT</button>
            <button class="btn btn-csv" onclick="exportData()">CSV</button>
            <button class="btn btn-reset" onclick="resetData()">RESET</button>
        </div>

        <div class="table-pro-wrap">
            <div class="table-scroll">
                <table id="tblMain">
                    <thead><tr><th>SHIFT</th><th>NAMA STAFF</th><th>TARGET</th><th>AKTUAL</th><th>STATUS</th><th width="40"></th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar-chat">
        <div class="chat-header"><strong>SYSTEM VOICE LOGS</strong><button onclick="hapusChat()" style="color:red; background:none; border:none; cursor:pointer; font-size:0.7rem;">Clear</button></div>
        <div class="chat-messages" id="chatWrap"></div>
        <div class="chat-footer"><input type="text" id="chatIn" placeholder="Pesan admin..."></div>
    </div>
</div>

<script>
    const ADMIN_PIN = "741852963"; 
    const NAMES = ["MARKUS FEBRIAN PAMUNGKAS ATJE", "PUTRI CAHAYA", "RADO DINATA", "SELWEN AL KHAIRI", "GIERDAV ALDEN AZUTOS DUMAT", "S PRIYA DARSIN", "DONY KRIS SANDI", "ALIKA SALSABILAH", "MUHAMMAD HABIB", "RIZKY AULIA", "NOVITA SARI", "ZULMADIL REYDINATA", "INDA AFRITYA", "AMANDA REZKY TANJUNG", "SAWALUDDIN HASIBUAN", "RISKA ARNITA PUTRI", "DIAN THERESA SIMAMORA", "JONATHAN QUEEN", "HENDRA", "SENDI REVIAN", "SYUKUR KURNIAWAN", "OGI CANDRA SAPUTRA", "IRVAN GANESHA", "RAHMA TINA", "JOSIA ROMANDA GINTING", "MUHAMMAD BAKRON MAULANA", "JIMMY", "CINDY NURUL AMALIA HASIBUAN", "DEVA NANDA", "MUHAMMAD JUHARI", "FANNY FADILLA", "WIRA ARIA SAPUTRA", "JANNIFER MENTARI SINGKOH", "AGUSSALIM FAJAR", "SASITHAREN", "JUWAN", "FRENDYCO", "KHOIRUL AMRI", "AL BETO", "APRI YOGO JOHANDA SEMBIRING", "ANDI", "FRANS WILLIAM ISKANDAR TAMBUNAN", "INDRA", "WILSON LEO WU", "ECHA ADELIA", "AHLUN IQBAL", "INDRA KURNIAWAN", "MARIO CHRISTOPHER SUNARWAN", "NADYA TASYA", "LUSI", "YOGI ARDIANSYAH", "SANJELIA PUTRI", "ARUN RAJZ", "KHAIRUL AZHAR", "BOBI ARFANDI", "HARIS MULIA MANURUNG", "ANDRA FAUZI", "ADITYA RIWANA", "JOHANDA JAYUSMAN", "SABAR MORANDO FRANCISCO MANIK", "RAJA EDWARD BANGUN", "DENNIS GOLDSTEIN", "DWIKI RAMDANI", "ABDUL TARIGAN", "RAHMAT HIDAYAT"];
    const TARGETS = { "PAGI": "07:45:00", "SHIFT G": "09:45:00", "SHIFT G2": "11:45:00", "SORE": "15:45:00", "MALAM": "21:45:00" };
    let modeTelat = false;

    // PERBAIKAN FUNGSI SUARA (OPTIMIZED)
    function speakAI(text) {
        const synth = window.speechSynthesis;
        synth.cancel(); 
        
        // Membersihkan teks agar tidak dieja
        let cleanText = text.toLowerCase();
        
        const utter = new SpeechSynthesisUtterance(cleanText);
        
        // Mencari voice Indonesia yang terbaik
        const voices = synth.getVoices();
        const idVoice = voices.find(v => v.lang.includes('id-ID'));
        if (idVoice) utter.voice = idVoice;

        utter.lang = 'id-ID';
        utter.rate = 1.0;  // Kecepatan normal
        utter.pitch = 1.0; // Nada normal
        utter.volume = 1.0;
        
        synth.speak(utter);
    }

    function hitungSelisih(target, aktual) {
        const [th, tm, ts] = target.split(':').map(Number);
        const [ah, am, as] = aktual.split(':').map(Number);
        const tSec = th*3600 + tm*60 + ts;
        const aSec = ah*3600 + am*60 + as;
        let diff = aSec - tSec;
        if (diff <= 0) return null;
        const h = Math.floor(diff/3600);
        const m = Math.floor((diff%3600)/60);
        const s = diff%60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function tambahAbsen() {
        const input = document.getElementById('iName');
        const name = input.value.trim().toUpperCase();
        const shift = document.getElementById('sShift').value;
        const time = document.getElementById('clockDisplay').innerText;
        
        if(!NAMES.includes(name)) return alert("Nama tidak terdaftar!");
        let db = JSON.parse(localStorage.getItem('tv_v18') || "[]");
        if(db.some(x => x.name === name)) return alert("Sudah absen!");

        const telat = hitungSelisih(TARGETS[shift], time);
        if(telat) {
            const [h, m] = telat.split(':').map(Number);
            speakAI(`Perhatian ${name.toLowerCase()}, anda terlambat ${h} jam ${m} menit.`);
        } else {
            speakAI(`Selamat datang ${name.toLowerCase()}.`);
        }

        db.push({ shift, name, target: TARGETS[shift], actual: time });
        localStorage.setItem('tv_v18', JSON.stringify(db));
        input.value = ""; render();
    }

    function hapusSatu(nama) {
        if(prompt("PIN ADMIN:") === ADMIN_PIN) {
            let db = JSON.parse(localStorage.getItem('tv_v18') || "[]");
            db = db.filter(x => x.name !== nama);
            localStorage.setItem('tv_v18', JSON.stringify(db));
            render();
        } else { alert("PIN Salah!"); }
    }

    function resetData() {
        if(prompt("PIN ADMIN:") === ADMIN_PIN) {
            localStorage.removeItem('tv_v18');
            render();
        } else { alert("PIN Salah!"); }
    }

    function render() {
        let db = JSON.parse(localStorage.getItem('tv_v18') || "[]");
        const tbody = document.querySelector('#tblMain tbody');
        tbody.innerHTML = "";
        
        let onTime = 0, late = 0;
        db.forEach(d => { if(hitungSelisih(d.target, d.actual)) late++; else onTime++; });
        document.getElementById('sOn').innerText = onTime;
        document.getElementById('sLate').innerText = late;
        document.getElementById('sAbs').innerText = NAMES.length - db.length;

        let displayDb = [...db].reverse();
        if(modeTelat) displayDb = displayDb.filter(x => hitungSelisih(x.target, x.actual));
        
        displayDb.forEach((d) => {
            const row = tbody.insertRow();
            const telat = hitungSelisih(d.target, d.actual);
            row.className = telat ? 'row-late' : 'row-ontime';
            row.innerHTML = `<td>${d.shift}</td><td style="text-align:left;">${d.name}</td><td>${d.target}</td><td>${d.actual}</td><td>${telat ? 'TELAT '+telat : 'TEPAT'}</td><td><button class="btn-del-pin" onclick="hapusSatu('${d.name}')">✕</button></td>`;
        });

        const dl = document.getElementById('staffs');
        dl.innerHTML = "";
        const sudah = db.map(x=>x.name);
        NAMES.filter(n => !sudah.includes(n)).forEach(n => {
            const o = document.createElement('option'); o.value = n; dl.appendChild(o);
        });
        renderChat();
    }

    function filterTelat() {
        modeTelat = !modeTelat;
        const btn = document.getElementById('btnF');
        btn.classList.toggle('active');
        btn.innerText = modeTelat ? "LIHAT SEMUA" : "CEK TELAT";
        render();
    }

    function exportData() {
        const db = JSON.parse(localStorage.getItem('tv_v18') || "[]");
        if (db.length === 0) return alert("Tidak ada data!");
        let csv = "SHIFT,NAMA,TARGET,AKTUAL,STATUS\n";
        db.forEach(x => {
            const t = hitungSelisih(x.target, x.actual);
            csv += `${x.shift},${x.name},${x.target},${x.actual},${t?'TELAT '+t:'TEPAT'}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ABSEN_TVTOTO_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function renderChat() {
        const box = document.getElementById('chatWrap');
        const c = JSON.parse(localStorage.getItem('tv_chat_v18') || "[]");
        box.innerHTML = c.map(m => `<div class="chat-bubble"><span class="bubble-name">ADMIN</span><br><span style="font-size:0.85rem;">${m.text}</span></div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('chatIn').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter' && e.target.value.trim()) {
            const pesan = e.target.value.trim();
            let c = JSON.parse(localStorage.getItem('tv_chat_v18') || "[]");
            c.push({ text: pesan });
            localStorage.setItem('tv_chat_v18', JSON.stringify(c));
            
            // Perbaikan: Paksa AI membaca kalimat utuh
            speakAI(pesan); 
            
            e.target.value = ""; 
            renderChat();
        }
    });

    function hapusChat() { if(confirm("Hapus log?")) { localStorage.removeItem('tv_chat_v18'); renderChat(); } }
    function updateClock() {
        const now = new Date();
        document.getElementById('clockDisplay').innerText = now.toTimeString().split(' ')[0];
        document.getElementById('pDate').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
        document.getElementById('pDay').innerText = now.toLocaleDateString('id-ID', {weekday:'long'}).toUpperCase();
    }
    setInterval(updateClock, 1000);
    window.onload = () => { 
        // Pancing daftar suara agar siap
        window.speechSynthesis.getVoices();
        updateClock(); 
        render(); 
    };
</script>
</body>
</html>
