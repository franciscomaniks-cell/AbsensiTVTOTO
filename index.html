<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System v18.7 | SECURE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-link active">🏠 ABSENSI</a>
            <a href="jobdesk.html" class="nav-link">📝 ATUR JOBDESK</a>
        </div>
    </nav>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 id="authTitle">LOGIN</h2>
            <div id="authFields">
                <input type="text" id="uUser" placeholder="Username">
                <input type="password" id="uPass" placeholder="Password">
                <input type="password" id="uConfirm" placeholder="Konfirmasi Password" style="display:none;">
            </div>
            <button class="btn-auth" id="mainAuthBtn" onclick="handleAuth()">MASUK</button>
            
            <div class="auth-links">
                <p id="toggleText">Belum punya akun? <span onclick="showRegister()">Daftar</span></p>
                <p id="forgotLink"><span onclick="showForgot()">Lupa Password?</span></p>
            </div>
            <div class="ip-indicator">
                103.20.83.166 <span class="dot-online">●</span>
            </div>
        </div>
    </div>

    <div class="logo-box"><img src="logo.png" onerror="this.src='logo.jpg';"></div>

    <div class="main-container">
        <div class="absensi-section">
            <div class="stat-grid">
                <div class="stat-card stat-ontime"><h4>Tepat Waktu</h4><p id="sOn">0</p></div>
                <div class="stat-card stat-late"><h4>Terlambat</h4><p id="sLate">0</p></div>
                <div class="stat-card stat-absent"><h4>Belum Absen</h4><p id="sAbs">65</p></div>
            </div>

            <div class="header-main">
                <div class="date-panel">
                    <p id="pDay">SENIN</p>
                    <h2 id="pDate">26 JAN 2026</h2>
                </div>
                <div class="title-panel">ABSEN TVTOTO</div>
            </div>

            <div class="tool-bar">
                <select id="sShift">
                    <option value="PAGI">PAGI (07:45)</option>
                    <option value="SHIFT G">SHIFT G (09:45)</option>
                    <option value="SHIFT G2">SHIFT G2 (11:45)</option>
                    <option value="SORE">SORE (15:45)</option>
                    <option value="MALAM">MALAM (21:45)</option>
                </select>
                <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
                <datalist id="staffs"></datalist>
                <div id="clockDisplay" class="digital-clock">00:00:00</div>
                <button class="btn btn-add" onclick="tambahAbsen()">ABSEN</button>
                <button class="btn btn-filter" id="btnF" onclick="filterTelat()">CEK TELAT</button>
                <button class="btn btn-csv" onclick="exportData()">CSV</button>
                <button class="btn btn-reset" onclick="resetData()">RESET</button>
                <button class="btn btn-logout" onclick="logout()">LOGOUT</button>
            </div>

            <div class="table-pro-wrap">
                <div class="table-scroll">
                    <table id="tblMain">
                        <thead>
                            <tr>
                                <th>SHIFT</th>
                                <th>NAMA STAFF</th>
                                <th>TARGET</th>
                                <th>AKTUAL</th>
                                <th>STATUS</th>
                                <th width="40"></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="sidebar-chat">
            <div class="chat-header">
                <strong>SYSTEM VOICE LOGS</strong>
                <button onclick="hapusChat()" class="btn-clear-chat">Clear</button>
            </div>
            <div class="chat-messages" id="chatWrap"></div>
            <div class="chat-footer">
                <input type="text" id="chatIn" placeholder="Pesan admin...">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
