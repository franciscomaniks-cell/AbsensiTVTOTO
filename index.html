<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authOverlay" class="auth-overlay" style="display: none;">
        <div class="auth-card">
            <h2 id="authTitle">LOGIN SYSTEM</h2>
            
            <div id="loginGroup">
                <input type="text" id="uUser" placeholder="Username">
                <input type="password" id="uPass" placeholder="Password">
            </div>
            
            <div id="registerGroup" style="display:none;">
                <input type="text" id="regUser" placeholder="Username Baru">
                <input type="password" id="regPass" placeholder="Password Baru">
            </div>

            <div id="forgotGroup" style="display:none;">
                <p style="font-size: 11px; color: #94a3b8; margin-bottom: 10px;">Hubungi Admin IT untuk reset password.</p>
                <input type="text" id="forgotUser" placeholder="Username Anda">
            </div>

            <button class="btn-auth" id="mainAuthBtn" onclick="handleAuth()">MASUK</button>
            
            <div class="auth-links">
                <span onclick="toggleAuth('register')" id="textReg">Belum punya akun? Daftar</span>
                <span onclick="toggleAuth('forgot')" id="textForgot">Lupa Password?</span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="side-head">
                <div class="brand">DASHBOARD</div>
            </div>
            <nav class="side-nav">
                <a href="#" class="nav-link active">🏠 Home / Absensi</a>
                <a href="jobdesk.html" class="nav-link">📝 Atur Jobdesk</a>
                <div class="spacer"></div>
                <a href="javascript:void(0)" class="nav-link logout-btn" onclick="logout()">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="layout-grid">
                
                <div class="left-side">
                    <div class="top-stats">
                        <div class="s-card green"><span>TEPAT WAKTU</span><h3 id="sOn">0</h3></div>
                        <div class="s-card red"><span>TERLAMBAT</span><h3 id="sLate">0</h3></div>
                        <div class="s-card yellow"><span>BELUM ABSEN</span><h3 id="sAbs">65</h3></div>
                    </div>

                    <div class="main-banner">
                        <div class="date-box">
                            <small id="pDay">SABTU</small>
                            <h2 id="pDate">21 FEB 2026</h2>
                        </div>
                        <div class="banner-text">ABSEN TVTOTO</div>
                    </div>

                    <div class="control-bar">
                        <select id="sShift">
                            <option value="PAGI">PAGI (07:45)</option>
                            <option value="SHIFT G">SHIFT G (09:45)</option>
                            <option value="SORE">SORE (15:45)</option>
                            <option value="MALAM">MALAM (21:45)</option>
                        </select>
                        <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
                        <datalist id="staffs"></datalist>
                        <div class="clock" id="clockDisplay">00:00:00</div>
                        
                        <div class="btn-row">
                            <button class="btn b-blue" onclick="tambahAbsen()">ABSEN</button>
                            <button class="btn b-yellow" onclick="filterTelat()">CEK TELAT</button>
                            <button class="btn b-green" onclick="exportData()">CSV</button>
                            <button class="btn b-red" onclick="resetData()">RESET</button>
                        </div>
                    </div>

                    <div class="table-area">
                        <table id="tblMain">
                            <thead>
                                <tr>
                                    <th>SHIFT</th>
                                    <th>NAMA STAFF</th>
                                    <th>TARGET</th>
                                    <th>AKTUAL</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="right-side">
                    <div class="voice-head">
                        <span>SYSTEM VOICE LOGS</span>
                        <button onclick="hapusChat()">Clear</button>
                    </div>
                    <div class="voice-body" id="chatWrap"></div>
                    <div class="voice-input">
                        <input type="text" id="chatIn" placeholder="Pesan admin..." onkeypress="if(event.key==='Enter') sendAdminChat()">
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
