<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Kehadiran TVTOTO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e3192; --accent: #d4a017; --success: #00ff88; --danger: #ff4d4d; --warning: #ffcc00;
            --glass: rgba(10, 10, 25, 0.96); --border-glass: rgba(255, 255, 255, 0.15);
            --sidebar-width: 250px;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; }
        body { margin: 0; padding: 0; background: #000 url('background.jpg') no-repeat center center fixed; background-size: cover; height: 100vh; overflow: hidden; color: #fff; display: flex; }

        /* --- SIDEBAR --- */
        #sidebar {
            width: var(--sidebar-width); background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-glass); padding: 20px 15px; display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-logo { width: 60px; height: 60px; background: var(--danger); border-radius: 12px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; border: 2px solid var(--accent); }
        .menu-label { font-size: 0.65rem; font-weight: 800; color: var(--accent); letter-spacing: 1.5px; margin: 20px 0 10px 10px; text-transform: uppercase; }
        .menu-item { display: flex; align-items: center; padding: 12px 15px; margin-bottom: 5px; border-radius: 10px; cursor: pointer; color: #ccc; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .menu-item.active { background: var(--primary); color: #fff; border-left: 4px solid var(--accent); }
        .menu-item span { margin-right: 10px; }

        /* --- MAIN CONTENT --- */
        #mainContainer { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .stat-card { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border-bottom: 4px solid #fff; text-align: center; }
        .stat-card h4 { margin: 0; font-size: 0.7rem; opacity: 0.7; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-family: 'Orbitron'; font-size: 1.5rem; font-weight: 700; }

        .app-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 0 20px 20px; flex: 1; overflow: hidden; }
        
        /* --- PANEL KIRI (ABSENSI) --- */
        .absen-panel { background: var(--glass); border-radius: 20px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; overflow: hidden; }
        .header-blue { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; }
        .header-blue .title { font-size: 1.2rem; letter-spacing: 2px; }
        
        .date-badge { background: var(--warning); color: #000; padding: 5px 15px; border-radius: 5px; font-weight: 800; font-size: 0.8rem; }

        .control-row { display: grid; grid-template-columns: 160px 1fr 120px auto auto auto; gap: 8px; padding: 15px; background: rgba(255,255,255,0.05); }
        .control-row input, .control-row select { padding: 10px; border-radius: 8px; border: none; outline: none; font-weight: 600; }
        .btn { padding: 0 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-absen { background: #3b5bdb; }
        .btn-csv { background: var(--success); color: #000; }
        .btn-reset { background: var(--danger); }

        .table-area { flex: 1; overflow-y: auto; background: white; color: #000; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f3f5; padding: 12px; font-size: 0.75rem; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-weight: 700; }

        /* --- PANEL KANAN (VOICE LOGS) --- */
        .log-panel { background: var(--glass); border-radius: 20px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; }
        .log-header { padding: 15px; border-bottom: 1px solid var(--border-glass); font-family: 'Orbitron'; font-size: 0.8rem; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent); }
        .chat-item b { color: var(--accent); font-size: 0.75rem; display: block; }
        .chat-input { padding: 15px; }
        .chat-input input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-logo">TV</div>
    <div class="menu-label">Menu Utama</div>
    <div class="menu-item"><span>📊</span> Dashboard Shift</div>
    <div class="menu-item"><span>🎲</span> Acak Jobdesk</div>
    <div class="menu-label">Absensi</div>
    <div class="menu-item active"><span>🕒</span> Absensi Kehadiran</div>
    <div class="menu-item"><span>📱</span> Absensi LINE</div>
    <div class="menu-label">Sistem</div>
    <div class="menu-item"><span>⚙️</span> Reset Password</div>
    <div class="menu-item" onclick="location.reload()" style="color:var(--danger)"><span>🚪</span> Logout</div>
</div>

<div id="mainContainer">
    <div class="top-stats">
        <div class="stat-card" style="border-color:var(--success); color:var(--success)">
            <h4>Tepat Waktu</h4><p id="countTepat">0</p>
        </div>
        <div class="stat-card" style="border-color:var(--danger); color:var(--danger)">
            <h4>Terlambat</h4><p id="countTelat">0</p>
        </div>
        <div class="stat-card" style="border-color:var(--warning); color:var(--warning)">
            <h4>Belum Absen</h4><p id="countBelum">65</p>
        </div>
    </div>

    <div class="app-grid">
        <div class="absen-panel">
            <div class="header-blue">
                <div class="date-badge" id="displayDate">JUMAT, 20 FEB 2026</div>
                <div class="title">ABSENSI KEHADIRAN</div>
                <div style="width:140px"></div>
            </div>

            <div class="control-row">
                <select id="selShift">
                    <option value="PAGI">PAGI (07:45)</option>
                    <option value="SHIFT G">SHIFT G (09:45)</option>
                    <option value="SORE">SORE (15:45)</option>
                    <option value="MALAM">MALAM (21:45)</option>
                </select>
                <input type="text" id="inpName" placeholder="Ketik Nama Staff...">
                <div id="liveClock" style="background:#000; color:var(--success); display:flex; align-items:center; justify-content:center; border-radius:8px; font-family:'Orbitron'; font-weight:bold; font-size:0.9rem; border:1px solid var(--success);">13:00:00</div>
                <button class="btn btn-absen" onclick="prosesAbsen()">ABSEN</button>
                <button class="btn btn-csv" onclick="downloadCSV()">CSV</button>
                <button class="btn btn-reset" onclick="resetHarian()">RESET</button>
            </div>

            <div class="table-area">
                <table id="tableAbsen">
                    <thead>
                        <tr>
                            <th>Shift</th>
                            <th>Nama Staff</th>
                            <th>Target</th>
                            <th>Aktual</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="log-panel">
            <div class="log-header">VOICE LOGS</div>
            <div id="chatBox"></div>
            <div class="chat-input">
                <input type="text" id="inpChat" placeholder="Ketik pesan lalu tekan Enter..." onkeypress="kirimChat(event)">
            </div>
        </div>
    </div>
</div>

<script>
    const TARGET_JAM = { "PAGI": "07:45:00", "SHIFT G": "09:45:00", "SORE": "15:45:00", "MALAM": "21:45:00" };

    function updateTime() {
        const n = new Date();
        const timeStr = n.toTimeString().split(' ')[0];
        document.getElementById('liveClock').innerText = timeStr;
        
        const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById('displayDate').innerText = n.toLocaleDateString('id-ID', options).toUpperCase();
    }

    function prosesAbsen() {
        const name = document.getElementById('inpName').value.trim().toUpperCase();
        const shift = document.getElementById('selShift').value;
        const actualTime = document.getElementById('liveClock').innerText;

        if (!name) { alert("Nama tidak boleh kosong!"); return; }

        let data = JSON.parse(localStorage.getItem('tvtoto_db') || "[]");

        // CEK DOUBLE
        const sudahAbsen = data.find(x => x.name === name && x.shift === shift);
        if (sudahAbsen) {
            alert("EROR: Nama " + name + " sudah absen di " + shift);
            return;
        }

        // SIMPAN
        const entry = {
            shift: shift,
            name: name,
            target: TARGET_JAM[shift],
            actual: actualTime,
            status: (actualTime > TARGET_JAM[shift]) ? "TELAT" : "TEPAT"
        };

        data.push(entry);
        localStorage.setItem('tvtoto_db', JSON.stringify(data));
        document.getElementById('inpName').value = "";
        refreshTable();
    }

    function refreshTable() {
        const data = JSON.parse(localStorage.getItem('tvtoto_db') || "[]");
        const tbody = document.querySelector('#tableAbsen tbody');
        tbody.innerHTML = "";
        
        let telat = 0;
        [...data].reverse().forEach(x => {
            if(x.status === "TELAT") telat++;
            tbody.innerHTML += `
                <tr style="background:${x.status === 'TELAT' ? '#fff0f0' : '#f0fff4'}">
                    <td>${x.shift}</td>
                    <td>${x.name}</td>
                    <td>${x.target}</td>
                    <td>${x.actual}</td>
                    <td style="color:${x.status === 'TELAT' ? 'red' : 'green'}">${x.status}</td>
                </tr>`;
        });

        document.getElementById('countTelat').innerText = telat;
        document.getElementById('countTepat').innerText = data.length - telat;
        document.getElementById('countBelum').innerText = 65 - data.length;
    }

    function kirimChat(e) {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            if (!val) return;
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `<b>ADMIN - ${new Date().toLocaleTimeString()}</b>${val}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            e.target.value = "";
        }
    }

    function resetHarian() {
        if (confirm("Hapus semua data absen?")) {
            localStorage.removeItem('tvtoto_db');
            refreshTable();
        }
    }

    function downloadCSV() {
        const data = JSON.parse(localStorage.getItem('tvtoto_db') || "[]");
        let csv = "Shift,Nama,Target,Aktual,Status\n";
        data.forEach(x => {
            csv += `${x.shift},${x.name},${x.target},${x.actual},${x.status}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'Absen_TVTOTO.csv');
        a.click();
    }

    setInterval(updateTime, 1000);
    window.onload = refreshTable;
</script>
</body>
</html>
