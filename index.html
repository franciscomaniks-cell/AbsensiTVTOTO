<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO POWER System v18.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <h2 id="authTitle">POWER LOGIN</h2>
        <input type="text" id="uUser" placeholder="Username">
        <input type="password" id="uPass" placeholder="Password">
        <button class="btn-auth" onclick="handleAuth()">MASUK</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="brand-power">POWER</div>
        <div class="brand-sub">CORE SYSTEM</div>
    </div>
    <nav>
        <a href="javascript:void(0)" class="nav-link active" id="nav-absensi" onclick="showPage('absensi')">
            <span class="icon">📊</span> ABSENSI STAFF
        </a>
        <a href="javascript:void(0)" class="nav-link" id="nav-jobdesk" onclick="showPage('jobdesk')">
            <span class="icon">⚙️</span> ATUR JOBDESK
        </a>
    </nav>
    <div style="flex-grow: 1;"></div>
    <button class="btn-logout-sidebar" onclick="logout()">LOGOUT</button>
</div>

<div class="main-content">
    
    <div id="page-absensi" class="page-container active">
        <div class="dashboard-grid">
            <div class="absensi-left">
                <div class="stat-row">
                    <div class="stat-card ontime"><h4>TEPAT WAKTU</h4><p id="sOn">0</p></div>
                    <div class="stat-card late"><h4>TERLAMBAT</h4><p id="sLate">0</p></div>
                    <div class="stat-card absent"><h4>BELUM ABSEN</h4><p id="sAbs">0</p></div>
                </div>

                <div class="header-banner">
                    <div class="banner-date">
                        <p id="pDay">SENIN</p>
                        <h2 id="pDate">26 JAN 2026</h2>
                    </div>
                    <div class="banner-title">ABSENSI TVTOTO</div>
                </div>

                <div class="control-panel">
                    <select id="sShift">
                        <option value="PAGI">PAGI (07:45)</option>
                        <option value="SHIFT G">SHIFT G (09:45)</option>
                        <option value="SHIFT G2">SHIFT G2 (11:45)</option>
                        <option value="SORE">SORE (15:45)</option>
                        <option value="MALAM">MALAM (21:45)</option>
                    </select>
                    <input type="text" id="iName" placeholder="Nama Staff..." list="staffs">
                    <datalist id="staffs"></datalist>
                    <div id="clockDisplay" class="clock">00:00:00</div>
                    <button class="btn-primary" onclick="tambahAbsen()">ABSEN</button>
                    <button class="btn-outline" onclick="exportData()">CSV</button>
                    <button class="btn-danger" onclick="resetData()">RESET</button>
                </div>

                <div class="table-wrapper">
                    <table id="tblMain">
                        <thead>
                            <tr>
                                <th>SHIFT</th>
                                <th>NAMA</th>
                                <th>TARGET</th>
                                <th>AKTUAL</th>
                                <th>STATUS</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
            <div class="absensi-right">
                <div class="voice-logs">
                    <div class="logs-header">SYSTEM VOICE LOGS</div>
                    <div id="chatWrap" class="logs-body"></div>
                    <div class="logs-footer">
                        <input type="text" id="chatIn" placeholder="Ketik pesan suara...">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-jobdesk" class="page-container">
        <div class="jobdesk-grid">
            <div class="jobdesk-inputs">
                <div class="card">
                    <label>🕒 PILIH SHIFT</label>
                    <select id="shiftSelect">
                        <option value="PAGI">SHIFT PAGI</option>
                        <option value="SORE">SHIFT SORE</option>
                        <option value="MALAM">SHIFT MALAM</option>
                    </select>
                </div>
                <div class="card">
                    <label>👥 DAFTAR STAFF (Baris 1 = Operator)</label>
                    <textarea id="staffInput">RADO DINATA
IRVAN GANESHA
JOSIA ROMANDA GINTING
MUHAMMAD BAKRON
JANNIFER MENTARI
CINDY NURUL
SENDI REVIAN
SYUKUR KURNIAWAN
HARYATI DEWI</textarea>
                </div>
                <div class="card">
                    <label>💼 DAFTAR JOBDESK</label>
                    <textarea id="jobInput">DEPO BRI, BNI
DEPO MANUAL, OGL
DEPO DANA, SCATTER
WD BCA, BRI
WD MANDIRI, BNI
SCATER
WD DANA
WD MANUAL, SEABANK</textarea>
                </div>
                <div class="btn-group-vertical">
                    <button class="btn-primary" onclick="generateJobdesk()">🎲 ACAK & SIMPAN</button>
                    <button class="btn-outline" onclick="copyToClipboard()">📋 COPY GAMBAR</button>
                    <button class="btn-success" onclick="downloadImage()">📸 SIMPAN PNG</button>
                </div>
            </div>

            <div class="jobdesk-preview">
                <div id="captureArea" class="capture-box">
                    <div class="capture-header">
                        <h2>LAPORAN PEMBAGIAN TUGAS</h2>
                        <div id="shiftDisplayText" class="shift-tag">SHIFT PAGI</div>
                        <div id="tableDateText" class="date-tag"></div>
                    </div>
                    <table class="result-table">
                        <thead>
                            <tr>
                                <th>NAMA PERSONEL</th>
                                <th>TUGAS OPERASIONAL</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody"></tbody>
                    </table>
                </div>
                
                <div class="history-box">
                    <h3>🕒 RIWAYAT TERBARU</h3>
                    <div id="historyList"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
