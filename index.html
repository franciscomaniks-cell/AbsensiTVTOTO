<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System v19.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e3192; --accent: #d4a017; --success: #00ff88; --danger: #ff4d4d; --warning: #ffcc00;
            --glass: rgba(15, 15, 30, 0.9); --border-glass: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            margin: 0; padding: 0; 
            background: #000 url('background.jpg') no-repeat center center fixed; 
            background-size: cover; height: 100vh; overflow: hidden; color: #fff;
        }

        /* --- AUTH LAYER --- */
        #authContainer { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .auth-card { background: #333; padding: 30px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #444; }
        .input-group { background: #444; border: 1px solid #555; border-radius: 8px; margin-bottom: 10px; display: flex; padding: 0 15px; }
        .input-group input { background: transparent; border: none; color: #fff; flex: 1; height: 45px; outline: none; }
        .btn-action { width: 100%; background: #d4a017; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        
        /* --- DASHBOARD LAYER --- */
        #mainApp { display: none; padding: 20px; height: 100vh; position: relative; }
        
        .logo-box { position: absolute; top: 15px; left: 15px; width: 60px; height: 60px; background: #8b0000; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .logo-box img { width: 80%; }

        .btn-logout { position: absolute; top: 15px; right: 15px; background: rgba(255,0,0,0.3); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 5px 12px; border-radius: 5px; font-size: 10px; cursor: pointer; font-weight: bold; }

        /* STATS */
        .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-left: 80px; margin-bottom: 15px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border-glass); border-radius: 10px; padding: 10px; text-align: center; }
        .stat-card h4 { margin: 0; font-size: 12px; }
        .stat-card p { margin: 5px 0 0; font-family: 'Orbitron'; font-size: 20px; font-weight: bold; }

        /* MAIN BOARD */
        .board-container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; height: 75vh; }
        .table-area { background: var(--glass); border-radius: 15px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; overflow: hidden; }
        
        .header-strip { background: var(--primary); padding: 10px; display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #fff; }
        .date-box { background: #d4a017; color: #000; padding: 5px 15px; border-radius: 5px; text-align: center; line-height: 1; }
        .title-text { flex: 1; text-align: center; font-family: 'Orbitron'; font-size: 24px; letter-spacing: 5px; font-weight: 900; }

        .control-bar { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); }
        .control-bar input, .control-bar select { background: #fff; border: none; padding: 10px; border-radius: 5px; font-weight: bold; }
        .clock-box { background: #000; color: #00ff88; border: 1px solid #00ff88; padding: 0 15px; display: flex; align-items: center; font-family: 'Orbitron'; border-radius: 5px; font-weight: bold; }

        /* TABLE */
        .table-wrap { flex: 1; overflow-y: auto; background: #fff; color: #000; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: #fff; padding: 10px; font-size: 11px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px dotted #ccc; text-align: center; font-weight: bold; font-size: 13px; }

        /* SIDEBAR VOICE */
        .sidebar { background: var(--glass); border-radius: 15px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; }
        .sidebar-head { padding: 10px; font-size: 11px; font-family: 'Orbitron'; border-bottom: 1px solid #333; }
        #chatWrap { flex: 1; padding: 10px; overflow-y: auto; font-size: 12px; }
        .chat-msg { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 5px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .chat-msg b { color: var(--accent); }
        #chatIn { background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; padding: 10px; margin: 10px; border-radius: 5px; outline: none; }

        .ip-info { text-align: center; font-size: 11px; font-family: 'Orbitron'; color: #aaa; margin-top: 10px; }
        .dot-green { color: #00ff88; }
    </style>
</head>
<body>

<div id="authContainer">
    <div id="loginBox" class="auth-card">
        <div class="input-group"><input type="text" id="userIn" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="passIn" placeholder="Password"></div>
        <button class="btn-action" onclick="handleLogin()">➜ Masuk</button>
        <div style="margin-top:15px; font-size:11px;">
            <span style="color:#aaa">Belum punya akun?</span> <a href="#" style="color:var(--accent)" onclick="switchAuth('daftar')">Daftar</a> | 
            <a href="#" style="color:var(--accent)" onclick="switchAuth('lupa')">Lupa?</a>
        </div>
        <div class="ip-info">103.20.83.166 <span class="dot-green">●</span></div>
    </div>

    <div id="daftarBox" class="auth-card" style="display:none">
        <h3>DAFTAR ADMIN</h3>
        <div class="input-group"><input type="text" id="newU" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="newP" placeholder="Password"></div>
        <button class="btn-action" onclick="handleDaftar()">BUAT AKUN</button>
        <button class="btn-action" style="background:#666; margin-top:5px;" onclick="switchAuth('login')">BATAL</button>
    </div>

    <div id="lupaBox" class="auth-card" style="display:none">
        <h3>CEK PASSWORD</h3>
        <div class="input-group"><input type="text" id="lupaU" placeholder="Username"></div>
        <button class="btn-action" onclick="handleLupa()">TAMPILKAN</button>
        <button class="btn-action" style="background:#666; margin-top:5px;" onclick="switchAuth('login')">KEMBALI</button>
    </div>
</div>

<div id="mainApp">
    <div class="logo-box">
        <img src="logo.png" onerror="this.src='https://via.placeholder.com/50/8b0000/ffffff?text=TV'">
    </div>
    <button class="btn-logout" onclick="handleLogout()">KELUAR SISTEM</button>

    <div class="stat-row">
        <div class="stat-card" style="border-bottom: 3px solid var(--success);"><h4 style="color:var(--success)">Tepat</h4><p id="sOn" style="color:var(--success)">0</p></div>
        <div class="stat-card" style="border-bottom: 3px solid var(--danger);"><h4 style="color:var(--danger)">Telat</h4><p id="sLate" style="color:var(--danger)">0</p></div>
        <div class="stat-card" style="border-bottom: 3px solid var(--warning);"><h4 style="color:var(--warning)">Belum</h4><p id="sAbs" style="color:var(--warning)">65</p></div>
    </div>

    <div class="board-container">
        <div class="table-area">
            <div class="header-strip">
                <div class="date-box">
                    <div id="pDay" style="font-size:8px; font-weight:bold;">JUMAT</div>
                    <div id="pDate" style="font-size:12px; font-weight:bold;">20 FEB 2026</div>
                </div>
                <div class="title-text">ABSEN TVTOTO</div>
            </div>
            
            <div class="control-bar">
                <select id="sShift">
                    <option value="PAGI">PAGI (07:45)</option>
                    <option value="SHIFT G">SHIFT G (09:45)</option>
                </select>
                <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs" style="flex:1">
                <datalist id="staffs"></datalist>
                <div id="clockBox" class="clock-box">00:00:00</div>
                <button onclick="tambahAbsen()" style="background:var(--primary); color:#fff; border:none; padding:0 15px; border-radius:5px; cursor:pointer; font-weight:bold;">ABSEN</button>
                <button onclick="exportCSV()" style="background:var(--success); color:#000; border:none; padding:0 15px; border-radius:5px; cursor:pointer; font-weight:bold;">CSV</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead><tr><th>SHIFT</th><th>NAMA STAFF</th><th>TARGET</th><th>AKTUAL</th><th>STATUS</th></tr></thead>
                    <tbody id="tblBody"></tbody>
                </table>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-head">VOICE LOGS</div>
            <div id="chatWrap"></div>
            <input type="text" id="chatIn" placeholder="Pesan Suara Admin...">
        </div>
    </div>
</div>

<script>
    // DATA STAFF LENGKAP (65 Nama)
    const NAMES = ["MARKUS FEBRIAN PAMUNGKAS ATJE", "PUTRI CAHAYA", "RADO DINATA", "SELWEN AL KHAIRI", "GIERDAV ALDEN AZUTOS DUMAT", "S PRIYA DARSIN", "DONY KRIS SANDI", "ALIKA SALSABILAH", "MUHAMMAD HABIB", "RIZKY AULIA", "NOVITA SARI", "ZULMADIL REYDINATA", "INDA AFRITYA", "AMANDA REZKY TANJUNG", "SAWALUDDIN HASIBUAN", "RISKA ARNITA PUTRI", "DIAN THERESA SIMAMORA", "JONATHAN QUEEN", "HENDRA", "SENDI REVIAN", "SYUKUR KURNIAWAN", "OGI CANDRA SAPUTRA", "IRVAN GANESHA", "RAHMA TINA", "JOSIA ROMANDA GINTING", "MUHAMMAD BAKRON MAULANA", "JIMMY", "CINDY NURUL AMALIA HASIBUAN", "DEVA NANDA", "MUHAMMAD JUHARI", "FANNY FADILLA", "WIRA ARIA SAPUTRA", "JANNIFER MENTARI SINGKOH", "AGUSSALIM FAJAR", "SASITHAREN", "JUWAN", "FRENDYCO", "KHOIRUL AMRI", "AL BETO", "APRI YOGO JOHANDA SEMBIRING", "ANDI", "FRANS WILLIAM ISKANDAR TAMBUNAN", "INDRA", "WILSON LEO WU", "ECHA ADELIA", "AHLUN IQBAL", "INDRA KURNIAWAN", "MARIO CHRISTOPHER SUNARWAN", "NADYA TASYA", "LUSI", "YOGI ARDIANSYAH", "SANJELIA PUTRI", "ARUN RAJZ", "KHAIRUL AZHAR", "BOBI ARFANDI", "HARIS MULIA MANURUNG", "ANDRA FAUZI", "ADITYA RIWANA", "JOHANDA JAYUSMAN", "SABAR MORANDO FRANCISCO MANIK", "RAJA EDWARD BANGUN", "DENNIS GOLDSTEIN", "DWIKI RAMDANI", "ABDUL TARIGAN", "RAHMAT HIDAYAT"];
    
    // AUTH
    function handleLogin() {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        let users = JSON.parse(localStorage.getItem('tv_users')) || [{u:"admin", p:"741852963"}];
        if(users.find(x => x.u === u && x.p === p)) {
            localStorage.setItem('tv_logged', 'true');
            location.reload();
        } else { alert("Salah!"); }
    }

    function switchAuth(t) {
        document.getElementById('loginBox').style.display = t==='login'?'block':'none';
        document.getElementById('daftarBox').style.display = t==='daftar'?'block':'none';
        document.getElementById('lupaBox').style.display = t==='lupa'?'block':'none';
    }

    function handleLogout() { localStorage.removeItem('tv_logged'); location.reload(); }

    // TIME
    function updateClock() {
        const now = new Date();
        document.getElementById('clockBox').innerText = now.toTimeString().split(' ')[0];
        document.getElementById('pDate').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
        document.getElementById('pDay').innerText = now.toLocaleDateString('id-ID', {weekday:'long'}).toUpperCase();
    }

    // ABSENSI
    function tambahAbsen() {
        const name = document.getElementById('iName').value.trim().toUpperCase();
        if(!NAMES.includes(name)) return alert("Nama tidak terdaftar!");
        
        let db = JSON.parse(localStorage.getItem('tv_absensi') || "[]");
        if(db.find(x => x.name === name)) return alert("Sudah absen!");

        const shift = document.getElementById('sShift').value;
        const time = document.getElementById('clockBox').innerText;
        db.push({ name, shift, actual: time, target: shift === 'PAGI' ? '07:45:00' : '09:45:00' });
        localStorage.setItem('tv_absensi', JSON.stringify(db));
        
        document.getElementById('iName').value = "";
        render();
    }

    function render() {
        let db = JSON.parse(localStorage.getItem('tv_absensi') || "[]");
        const body = document.getElementById('tblBody');
        body.innerHTML = "";
        db.reverse().forEach(x => {
            body.innerHTML += `<tr><td>${x.shift}</td><td>${x.name}</td><td>${x.target}</td><td>${x.actual}</td><td>TERCATAT</td></tr>`;
        });
        document.getElementById('sOn').innerText = db.length;
        document.getElementById('sAbs').innerText = 65 - db.length;
        document.getElementById('staffs').innerHTML = NAMES.map(n => `<option value="${n}">`).join('');
    }

    window.onload = () => {
        if(localStorage.getItem('tv_logged') === 'true') {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }
        setInterval(updateClock, 1000);
        render();
    }
</script>
</body>
</html>
