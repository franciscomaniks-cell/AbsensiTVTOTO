<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi - REALTIME DATABASE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e3192; --accent: #d4a017; --success: #00ff88; --danger: #ff4d4d; --warning: #ffcc00;
            --glass: rgba(10, 10, 25, 0.96); --border-glass: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; }
        body { margin: 0; padding: 0; background: #000 url('background.jpg') no-repeat center center fixed; background-size: cover; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; color: #fff; }

        /* --- AUTH & APP HIDDEN BY DEFAULT --- */
        #authContainer { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .auth-card { background: #4a4a4a; padding: 35px; border-radius: 20px; width: 380px; text-align: center; border: 1px solid #5d5d5d; }
        
        #mainApp { width: 100%; height: 100%; padding: 20px; display: none; position: relative; }
        .main-container { display: grid; grid-template-columns: 1fr 380px; gap: 20px; width: 100%; height: 92vh; margin-top: 40px; }

        /* --- CHAT BOX UI --- */
        .sidebar-chat { background: var(--glass); border-radius: 25px; border: 1px solid var(--border-glass); display: flex; flex-direction: column; overflow: hidden; }
        #chatWrap { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { background: #22252a; padding: 12px; border-radius: 12px; border-left: 4px solid var(--accent); font-size: 0.9rem; }
        .chat-bubble b { text-transform: uppercase; color: var(--accent); }
        
        /* Utility */
        .btn-action { width: 100%; background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .input-group { background: #5d5d5d; border: 1px solid #777; border-radius: 8px; margin-bottom: 12px; padding: 10px; display: flex; }
        .input-group input { background: transparent; border: none; color: #fff; flex: 1; outline: none; }
    </style>
</head>
<body>

<div id="authContainer">
    <div id="loginBox" class="auth-card">
        <h3 style="font-family:'Orbitron'; color:var(--accent);">LOGIN SYSTEM</h3>
        <div class="input-group"><input type="text" id="userIn" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="passIn" placeholder="Password"></div>
        <button class="btn-action" onclick="handleLogin()">➜ Masuk</button>
    </div>
</div>

<div id="mainApp">
    <button onclick="handleLogout()" style="position:absolute; top:20px; right:20px; color:red; cursor:pointer;">✕ LOGOUT</button>
    
    <div class="main-container">
        <div style="background:var(--glass); border-radius:25px; padding:20px;">
            <h2 style="font-family:'Orbitron';">SISTEM ABSENSI</h2>
            <div id="status">Menghubungkan ke Firebase...</div>
            <hr>
            <input type="text" id="iName" placeholder="Nama Staff..." style="padding:10px; width:200px;">
            <button onclick="tambahAbsen()" class="btn-action" style="width:auto;">ABSEN</button>
        </div>

        <div class="sidebar-chat">
            <div style="padding:15px; background:rgba(255,255,255,0.1); font-weight:bold; display:flex; justify-content:space-between;">
                VOICE LOGS <span onclick="clearChatFirebase()" style="color:red; cursor:pointer; font-size:0.7rem;">HAPUS LOG</span>
            </div>
            <div id="chatWrap"></div>
            <input type="text" id="chatIn" placeholder="Ketik pesan..." style="margin:15px; padding:12px; border-radius:8px; border:none; background:rgba(255,255,255,0.2); color:white;">
        </div>
    </div>
</div>

<script>
    // 1. KONFIGURASI FIREBASE (Ganti dengan milik Anda)
    const firebaseConfig = {
        apiKey: "MASUKKAN_API_KEY_ANDA",
        databaseURL: "https://PROYEK-ANDA-default-rtdb.firebaseio.com/",
        projectId: "PROYEK-ANDA",
        storageBucket: "PROYEK-ANDA.appspot.com",
        messagingSenderId: "ID_SENDER",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- AUTH LOGIC ---
    function handleLogin() {
        const u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value.trim();
        if(u === "admin" && p === "741852963") { // Contoh simple
            localStorage.setItem('currentUser', u);
            localStorage.setItem('isLoggedIn', 'true');
            location.reload();
        } else { alert("User/Pass Salah"); }
    }

    function handleLogout() {
        localStorage.clear();
        location.reload();
    }

    // --- REALTIME CHAT LOGIC ---
    const chatRef = db.ref('chats');

    // MENGIRIM PESAN
    document.getElementById('chatIn').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const user = localStorage.getItem('currentUser') || "Guest";
            const msg = e.target.value;
            if(!msg) return;

            chatRef.push({
                sender: user,
                text: msg,
                timestamp: Date.now()
            });
            e.target.value = "";
        }
    });

    // MENERIMA PESAN (Realtime Listen)
    chatRef.on('value', (snapshot) => {
        const wrap = document.getElementById('chatWrap');
        wrap.innerHTML = "";
        snapshot.forEach((child) => {
            const data = child.val();
            wrap.innerHTML += `
                <div class="chat-bubble">
                    <b>${data.sender}:</b> ${data.text}
                </div>`;
        });
        wrap.scrollTop = wrap.scrollHeight;
    });

    function clearChatFirebase() {
        if(confirm("Hapus semua chat untuk SEMUA orang?")) {
            chatRef.remove();
        }
    }

    // --- INITIAL LOAD ---
    window.onload = () => {
        if(localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('status').innerText = "🟢 Terhubung ke Server";
        }
    };
</script>
</body>
</html>
