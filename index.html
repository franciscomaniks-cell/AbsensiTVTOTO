<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System v18.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 id="authTitle">LOGIN SYSTEM</h2>
            <div id="authFields">
                <input type="text" id="uUser" placeholder="Username" autocomplete="off">
                <input type="password" id="uPass" placeholder="Password">
            </div>
            <button class="btn-auth" id="mainAuthBtn" onclick="handleAuth()">MASUK</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">TVTOTO</div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" onclick="location.href='index.html'">🏠 Dashboard Absensi</div>
                <div class="nav-item" onclick="location.href='jobdesk.html'">📝 Atur Jobdesk</div>
                <div class="nav-divider"></div>
                <div class="nav-item logout" onclick="logout()">🚪 Logout</div>
            </nav>
        </aside>

        <main class="content-wrapper">
            <div class="dashboard-layout">
                
                <div class="absensi-panel">
                    <div class="stat-grid">
                        <div class="stat-card logo-box-red">
                            <img src="logo.png" class="img-in-stats" onerror="this.src='logo.jpg'">
                        </div>
                        <div class="stat-card ontime">
                            <h4>TEPAT WAKTU</h4>
                            <p id="sOn">0</p>
                        </div>
                        <div class="stat-card late">
                            <h4>TERLAMBAT</h4>
                            <p id="sLate">0</p>
                        </div>
                        <div class="stat-card total">
                            <h4>BELUM ABSEN</h4>
                            <p id="sAbs">65</p>
                        </div>
                    </div>

                    <div class="header-main">
                        <div class="date-panel">
                            <p id="pDay">SABTU</p>
                            <h2 id="pDate">21 FEB 2026</h2>
                        </div>
                        <div class="title-panel">ABSEN TVTOTO</div>
                    </div>

                    <div class="tool-bar">
                        <select id="sShift">
                            <option value="PAGI">PAGI (07:45)</option>
                            <option value="SHIFT G">SHIFT G (09:45)</option>
                            <option value="SORE">SORE (15:45)</option>
                            <option value="MALAM">MALAM (21:45)</option>
                        </select>
                        <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
                        <datalist id="staffs"></datalist>
                        <div id="clockDisplay" class="digital-clock">00:00:00</div>
                        <div class="action-buttons">
                            <button class="btn btn-add" onclick="tambahAbsen()">ABSEN</button>
                            <button class="btn btn-filter" onclick="filterTelat()">CEK TELAT</button>
                            <button class="btn btn-csv" onclick="exportData()">CSV</button>
                            <button class="btn btn-reset" onclick="resetData()">RESET</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="tblMain">
                            <thead>
                                <tr>
                                    <th>SHIFT</th>
                                    <th>NAMA STAFF</th>
                                    <th>TARGET</th>
                                    <th>AKTUAL</th>
                                    <th>STATUS</th>
                                    <th>AKSI</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="voice-logs-panel">
                    <div class="chat-header">
                        <strong>SYSTEM VOICE LOGS</strong>
                        <button onclick="hapusChat()" class="btn-clear">Clear</button>
                    </div>
                    <div id="chatWrap" class="chat-messages"></div>
                    <div class="chat-footer">
