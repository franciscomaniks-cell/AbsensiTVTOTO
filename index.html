<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cyber-bg">

    <div id="authOverlay" style="display: none;">
        <div class="auth-card">
            <h2>LOGIN SYSTEM</h2>
            <input type="text" id="uUser" placeholder="Username">
            <input type="password" id="uPass" placeholder="Password">
            <button onclick="handleAuth()">MASUK</button>
            <div class="auth-links">
                <a href="#">Belum punya akun? Daftar</a>
                <a href="#">Lupa Password?</a>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="brand-text">DASHBOARD</span>
                <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">🏠 Home / Absensi</a>
                <a href="jobdesk.html" class="nav-item">📝 Atur Jobdesk</a>
                <div class="nav-spacer"></div>
                <a href="javascript:void(0)" class="nav-item logout" onclick="logout()">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="stats-container">
                <div class="stat-box green"><span>TEPAT WAKTU</span><h3 id="sOn">0</h3></div>
                <div class="stat-box red"><span>TERLAMBAT</span><h3 id="sLate">0</h3></div>
                <div class="stat-box yellow"><span>BELUM ABSEN</span><h3 id="sAbs">65</h3></div>
            </div>

            <div class="absensi-banner">
                <div class="date-side">
                    <small id="pDay">SABTU</small>
                    <h2 id="pDate">21 FEB 2026</h2>
                </div>
                <div class="title-side">ABSEN TVTOTO</div>
            </div>

            <div class="workspace">
                <div class="left-panel">
                    <div class="control-bar">
                        <select id="sShift">
                            <option value="PAGI">PAGI (07:45)</option>
                            <option value="SHIFT G">SHIFT G (09:45)</option>
                            <option value="SORE">SORE (15:45)</option>
                            <option value="MALAM">MALAM (21:45)</option>
                        </select>
                        <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
                        <datalist id="staffs"></datalist>
                        <div class="digital-clock" id="clockDisplay">00:00:00</div>
                        <div class="button-group">
                            <button class="btn-absen" onclick="tambahAbsen()">ABSEN</button>
                            <button class="btn-cek" onclick="filterTelat()">CEK TELAT</button>
                            <button class="btn-csv" onclick="exportData()">CSV</button>
                            <button class="btn-reset" onclick="resetData()">RESET</button>
                        </div>
                    </div>

                    <div class="table-wrapper">
                        <table id="tblMain">
                            <thead>
                                <tr>
                                    <th>SHIFT</th>
                                    <th>NAMA STAFF</th>
                                    <th>TARGET</th>
                                    <th>AKTUAL</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="chat-header">
                        <span>SYSTEM VOICE LOGS</span>
                        <button onclick="hapusChat()">Clear</button>
                    </div>
                    <div class="chat-content" id="chatWrap"></div>
                    <div class="chat-footer">
                        <input type="text" id="chatIn" placeholder="Pesan admin..." onkeypress="if(event.key==='Enter') sendAdminChat()">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
