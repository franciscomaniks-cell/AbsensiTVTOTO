<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO Absensi System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-badge">DASHBOARD</div>
                <button class="menu-toggle">☰</button>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="nav-item active">🏠 Home / Absensi</a>
                <a href="jobdesk.html" class="nav-item">📝 Atur Jobdesk</a>
                <div class="spacer"></div>
                <a href="#" class="nav-item logout" onclick="logout()">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-screen">
            <div class="dashboard-grid">
                
                <div class="center-panel">
                    <div class="stats-row">
                        <div class="stat-box ontime"><span>TEPAT WAKTU</span><h3 id="sOn">0</h3></div>
                        <div class="stat-box late"><span>TERLAMBAT</span><h3 id="sLate">0</h3></div>
                        <div class="stat-box absent"><span>BELUM ABSEN</span><h3 id="sAbs">65</h3></div>
                    </div>

                    <div class="absensi-header">
                        <div class="date-box">
                            <small id="pDay">SABTU</small>
                            <h2 id="pDate">21 FEB 2026</h2>
                        </div>
                        <div class="title-box">ABSEN TVTOTO</div>
                    </div>

                    <div class="toolbar">
                        <select id="sShift">
                            <option value="PAGI">PAGI (07:45)</option>
                            <option value="SHIFT G">SHIFT G (09:45)</option>
                            <option value="SORE">SORE (15:45)</option>
                            <option value="MALAM">MALAM (21:45)</option>
                        </select>
                        <input type="text" id="iName" placeholder="Ketik Nama Staff..." list="staffs">
                        <datalist id="staffs"></datalist>
                        <div class="digital-clock" id="clockDisplay">00:00:00</div>
                        <div class="action-btns">
                            <button class="btn btn-absen" onclick="tambahAbsen()">ABSEN</button>
                            <button class="btn btn-cek" onclick="filterTelat()">CEK TELAT</button>
                            <button class="btn btn-csv" onclick="exportData()">CSV</button>
                            <button class="btn btn-reset" onclick="resetData()">RESET</button>
                            <button class="btn btn-logout-mobile" onclick="logout()">LOGOUT</button>
                        </div>
                    </div>

                    <div class="table-frame">
                        <table id="tblMain">
                            <thead>
                                <tr>
                                    <th>SHIFT</th>
                                    <th>NAMA STAFF</th>
                                    <th>TARGET</th>
                                    <th>AKTUAL</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="voice-header">
                        <span>SYSTEM VOICE LOGS</span>
                        <button class="clear-link" onclick="hapusChat()">Clear</button>
                    </div>
                    <div class="voice-content" id="chatWrap"></div>
                    <div class="voice-input">
                        <input type="text" id="chatIn" placeholder="Pesan admin..." onkeypress="if(event.key==='Enter') sendAdminChat()">
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
