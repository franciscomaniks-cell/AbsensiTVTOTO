<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jobdesk Staff TVTOTO - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #15803d;
            --dark-bg: #020617;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
            --accent-gold: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* HEADER */
        .brand-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2);
        }

        .brand-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .date-badge {
            background: rgba(0, 0, 0, 0.8);
            color: var(--primary);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 12px;
            display: inline-block;
            font-weight: 700;
        }

        /* CARD SYSTEM */
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        textarea, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #334155;
            color: #fff;
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea { height: 160px; resize: none; line-height: 1.6; }

        /* BUTTONS */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            transition: 0.2s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-acak { background: #fff; color: #000; }
        .btn-copy { background: var(--accent-gold); color: #fff; }
        .btn-png { background: var(--primary); color: #000; }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* REPORT AREA */
        #captureArea {
            background: white;
            padding: 40px;
            border-radius: 15px;
            color: #1e293b;
        }

        .table-header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .table-header h2 { margin: 0; font-size: 20px; font-weight: 800; color: #0f172a; }
        .table-header .shift-title { font-size: 24px; color: var(--primary-dark); font-weight: 900; margin: 5px 0; }

        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th {
            background: #f1f5f9;
            padding: 12px;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-size: 11px;
            text-transform: uppercase;
        }

        .result-table td {
            padding: 14px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        .row-alt { background-color: #fff1f2; }
        .row-operator {
            background: #dcfce7 !important;
            color: #166534;
            font-weight: 800;
        }

        /* HISTORY AREA */
        .history-section {
            margin-top: 40px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-reset-all {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            font-size: 11px;
            border-radius: 8px;
        }

        .history-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .history-item {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover { border-color: var(--primary); background: #1e293b; }
        
        @media (max-width: 600px) {
            .input-grid, .btn-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-header">
            <h1>JOBDESK STAFF TVTOTO</h1>
            <div class="date-badge" id="displayDate"></div>
        </div>

        <div class="card">
            <label>🕒 Pilih Shift Operasional</label>
            <select id="shiftSelect">
                <option value="PAGI">Shift PAGI</option>
                <option value="SORE">Shift SORE</option>
                <option value="MALAM">Shift MALAM</option>
            </select>
        </div>

        <div class="input-grid">
            <div class="card">
                <label>👥 Daftar Staff (Baris 1 = Operator)</label>
                <textarea id="staffInput">RADO DINATA
IRVAN GANESHA
JOSIA ROMANDA GINTING
MUHAMMAD BAKRON
JANNIFER MENTARI
CINDY NURUL
SENDI REVIAN
SYUKUR KURNIAWAN
HARYATI DEWI</textarea>
            </div>
            <div class="card">
                <label>💼 Daftar Jobdesk (Akan Diacak)</label>
                <textarea id="jobInput">DEPO BRI, BNI
DEPO MANUAL, OGL
DEPO DANA, SCATTER
WD BCA, BRI
WD MANDIRI, BNI
SCATER
WD DANA
WD MANUAL, SEABANK</textarea>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-acak" onclick="generateJobdesk()">🎲 Acak & Simpan</button>
            <button class="btn-copy" onclick="copyToClipboard()">📋 Copy Gambar</button>
            <button class="btn-png" onclick="downloadImage()">📸 Simpan PNG</button>
        </div>

        <div id="captureArea">
            <div class="table-header">
                <h2>LAPORAN PEMBAGIAN TUGAS</h2>
                <div class="shift-title" id="shiftDisplayText">SHIFT PAGI</div>
                <div id="tableDateText" style="font-weight: 700; color: #166534;"></div>
            </div>
            <table class="result-table">
                <thead>
                    <tr>
                        <th width="50%">NAMA PERSONEL</th>
                        <th width="50%">TUGAS OPERASIONAL</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    </tbody>
            </table>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3 style="margin: 0; font-size: 14px; color: var(--primary);">🕒 Riwayat Penugasan (Lokal)</h3>
                <button class="btn-reset-all" onclick="clearHistory()">🗑️ HAPUS SEMUA</button>
            </div>
            <div id="historyList" class="history-list">
                <p style="color:var(--text-muted); font-size: 12px;">Belum ada riwayat.</p>
            </div>
        </div>
    </div>

    <script>
        const options = { day: "numeric", month: "long", year: "numeric" };
        const dateNow = new Date().toLocaleDateString("id-ID", options);
        document.getElementById("displayDate").innerText = dateNow;
        document.getElementById("tableDateText").innerText = dateNow;

        let dbHistory = JSON.parse(localStorage.getItem("tvtoto_history_pro")) || [];

        function generateJobdesk() {
            const shift = document.getElementById("shiftSelect").value;
            document.getElementById("shiftDisplayText").innerText = "SHIFT " + shift;

            const staffArr = document.getElementById("staffInput").value.split("\n").filter(t => t.trim() !== "");
            const jobArr = document.getElementById("jobInput").value.split("\n").filter(t => t.trim() !== "");

            if (staffArr.length < 1) return alert("Masukkan nama staff!");

            // Logika Pengacakan
            const operatorName = staffArr[0];
            const otherStaff = staffArr.slice(1);
            let shuffledJobs = [...jobArr].sort(() => Math.random() - 0.5);

            const results = [];
            results.push({ name: operatorName, job: "OPERATOR" });

            otherStaff.forEach((name, i) => {
                results.push({
                    name: name,
                    job: shuffledJobs[i] || "CADANGAN / STANDBY"
                });
            });

            renderTable(results);
            saveToLocalStorage(results, shift);
        }

        function renderTable(data) {
            const tbody = document.getElementById("resultBody");
            tbody.innerHTML = "";
            data.forEach((item, i) => {
                const isOp = item.job === "OPERATOR";
                const rowClass = isOp ? "row-operator" : (i % 2 !== 0 ? "row-alt" : "");
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td>${item.name.toUpperCase()}</td>
                        <td>${item.job.toUpperCase()}</td>
                    </tr>`;
            });
        }

        function saveToLocalStorage(data, shift) {
            const entry = {
                id: Date.now(),
                date: dateNow,
                time: new Date().toLocaleTimeString("id-ID"),
                shift: shift,
                assignments: data
            };
            dbHistory.unshift(entry);
            if (dbHistory.length > 12) dbHistory.pop();
            localStorage.setItem("tvtoto_history_pro", JSON.stringify(dbHistory));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById("historyList");
            if (dbHistory.length === 0) {
                container.innerHTML = "<p style='color:#94a3b8; font-size:12px;'>Belum ada riwayat.</p>";
                return;
            }
            container.innerHTML = dbHistory.map(item => `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <div>
                        <b style="color:var(--primary); font-size:13px;">${item.shift}</b><br>
                        <small style="color:#94a3b8; font-size:10px;">${item.time}</small>
                    </div>
                    <span style="color:var(--primary)">➔</span>
                </div>
            `).join("");
        }

        function loadHistoryItem(id) {
            const item = dbHistory.find(h => h.id === id);
            if (item) {
                document.getElementById("shiftDisplayText").innerText = "SHIFT " + item.shift;
                renderTable(item.assignments);
                window.scrollTo({ top: document.getElementById("captureArea").offsetTop - 50, behavior: "smooth" });
            }
        }

        function clearHistory() {
            if (confirm("Hapus seluruh riwayat secara permanen?")) {
                dbHistory = [];
                localStorage.removeItem("tvtoto_history_pro");
                renderHistory();
            }
        }

        async function copyToClipboard() {
            const area = document.getElementById("captureArea");
            const canvas = await html2canvas(area, { scale: 2 });
            canvas.toBlob(blob => {
                const item = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([item]);
                alert("✅ Gambar berhasil disalin!");
            });
        }

        function downloadImage() {
            html2canvas(document.getElementById("captureArea"), { scale: 2 }).then(canvas => {
                const link = document.createElement("a");
                link.download = `Jobdesk_TVTOTO_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Inisialisasi
        renderHistory();
        generateJobdesk();
    </script>
</body>
</html>
