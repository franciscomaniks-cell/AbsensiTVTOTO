<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TVTOTO - Atur Jobdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="dashboard-tag">DASHBOARD</div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item" onclick="location.href='index.html'">🏠 Home / Absensi</div>
                <div class="nav-item active">📝 Atur Jobdesk</div>
                <div class="nav-item logout" onclick="logout()">🚪 Logout</div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="jobdesk-panel">
                <h1 style="color:white; margin-bottom: 20px;">PENGACAK JOBDESK OPERASIONAL</h1>
                <div class="job-grid">
                    <div class="input-card">
                        <label>Daftar Staff (Satu nama per baris)</label>
                        <textarea id="staffList" rows="10"></textarea>
                    </div>
                    <div class="input-card">
                        <label>Daftar Tugas</label>
                        <textarea id="jobList" rows="10"></textarea>
                    </div>
                </div>
                <button class="btn btn-blue" style="width:100%; margin-top:20px; padding:15px" onclick="acakTugas()">GENERATE JOBDESK</button>
                
                <div id="resultArea" style="margin-top:30px"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
