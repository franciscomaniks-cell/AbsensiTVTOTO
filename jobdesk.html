<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVTOTO | Jobdesk Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="brand-text">POWER</span>
            <button class="toggle-btn-inner" onclick="toggleNav()">☰</button>
        </div>
        <div class="menu-items">
            <a href="index.html"><span class="icon">🏠</span> Dashboard Absensi</a>
            <a href="jobdesk.html" class="active"><span class="icon">📝</span> Atur Jobdesk</a>
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 10px 0;">
            <a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a>
        </div>
    </div>

    <button id="openBtn" class="open-sidebar-btn" onclick="toggleNav()">☰</button>

    <div class="main-container" id="mainContent" style="display: block; overflow-y: auto;">
        <div class="jobdesk-wrapper" style="max-width: 900px; margin: auto; padding-top: 20px;">
            <div class="header-main" style="border: none; background: var(--primary); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                 <h2 style="margin:0; font-family:'Orbitron'; text-align:center;">PEMBAGIAN JOBDESK</h2>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="card-job">
                    <label>👥 Daftar Staff</label>
                    <textarea id="staffInput" rows="8">RADO DINATA&#10;IRVAN GANESHA&#10;JOSIA ROMANDA&#10;SENDI REVIAN</textarea>
                </div>
                <div class="card-job">
                    <label>💼 Daftar Jobdesk</label>
                    <textarea id="jobInput" rows="8">DEPO BRI, BNI&#10;WD BCA, BRI&#10;WD DANA&#10;SCATTER</textarea>
                </div>
            </div>

            <div class="tool-bar" style="grid-template-columns: 1fr 1fr 1fr;">
                <select id="shiftSelectJob">
                    <option value="PAGI">SHIFT PAGI</option>
                    <option value="SORE">SHIFT SORE</option>
                    <option value="MALAM">SHIFT MALAM</option>
                </select>
                <button class="btn btn-add" onclick="generateJobdesk()">🎲 Acak Tugas</button>
                <button class="btn btn-csv" onclick="downloadJobImage()">📸 Download Gambar</button>
            </div>

            <div id="captureArea" style="background: white; padding: 20px; border-radius: 10px; margin-top: 20px; color: black;">
                <h3 id="jobDateDisplay" style="text-align: center; margin-bottom: 5px;">LAPORAN TUGAS</h3>
                <h4 id="jobShiftDisplay" style="text-align: center; color: var(--primary); margin-top: 0;">SHIFT PAGI</h4>
                <table style="width: 100%; border-collapse: collapse; color: black;" id="jobResultTable">
                    <thead>
                        <tr style="background: #eee;">
                            <th style="padding: 10px; border: 1px solid #ccc;">NAMA STAFF</th>
                            <th style="padding: 10px; border: 1px solid #ccc;">TUGAS</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Spesifik script untuk halaman jobdesk
        function generateJobdesk() {
            const staffArr = document.getElementById("staffInput").value.split("\n").filter(t => t.trim() !== "");
            const jobArr = document.getElementById("jobInput").value.split("\n").filter(t => t.trim() !== "");
            const shift = document.getElementById("shiftSelectJob").value;
            
            if (staffArr.length < 1) return alert("Masukkan nama staff!");
            
            document.getElementById("jobShiftDisplay").innerText = "SHIFT " + shift;
            let shuffledJobs = [...jobArr].sort(() => Math.random() - 0.5);
            
            const tbody = document.getElementById("resultBody");
            tbody.innerHTML = "";
            
            staffArr.forEach((name, i) => {
                const job = i === 0 ? "OPERATOR" : (shuffledJobs[i-1] || "CADANGAN");
                const row = `<tr>
                    <td style="padding: 10px; border: 1px solid #ccc; font-weight: bold;">${name.toUpperCase()}</td>
                    <td style="padding: 10px; border: 1px solid #ccc;">${job.toUpperCase()}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function downloadJobImage() {
            html2canvas(document.querySelector("#captureArea")).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Jobdesk_TVTOTO.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
