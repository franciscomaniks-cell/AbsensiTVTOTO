<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWER - Management Jobdesk TVTOTO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #11141d;
            --body-bg: #090b10;
            --card-bg: #161b26;
            --primary-green: #22c55e;
            --power-yellow: #facc15;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 30px 25px;
            font-size: 26px;
            font-weight: 800;
            color: var(--power-yellow);
            letter-spacing: 1px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 25px;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-link:hover { background: #1e293b; color: #fff; }
        .nav-link.active {
            background: linear-gradient(90deg, #22c55e20 0%, transparent 100%);
            color: var(--primary-green);
            border-left: 4px solid var(--primary-green);
        }

        .nav-link i { margin-right: 12px; font-style: normal; }

        /* MAIN LAYOUT */
        .main-wrapper {
            margin-left: 260px; /* Jarak agar tidak tertutup sidebar */
            flex-grow: 1;
            padding: 30px;
            width: calc(100% - 260px);
        }

        .header-banner {
            background: linear-gradient(135deg, #15803d 0%, #22c55e 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .header-banner h1 { margin: 0; font-size: 22px; font-weight: 800; color: #000; text-transform: uppercase; }
        .header-banner p { margin: 5px 0 0; color: #000; font-weight: 600; opacity: 0.8; }

        /* INPUT AREA */
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d3748;
        }

        .input-card label {
            display: block;
            color: var(--primary-green);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        select, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }

        textarea { height: 160px; resize: none; line-height: 1.5; }

        /* ACTIONS */
        .action-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-gen { background: #fff; color: #000; }
        .btn-copy { background: #f59e0b; color: #fff; }
        .btn-save { background: var(--primary-green); color: #000; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* OUTPUT TABLE AREA */
        #captureArea {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            color: #1a202c;
        }

        .table-header {
            text-align: center;
            border-bottom: 3px solid var(--primary-green);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .table-header h2 { margin: 0; font-size: 24px; font-weight: 800; color: #111; }
        .shift-tag {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: 800;
            margin-top: 10px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; color: #475569; padding: 15px; border: 1px solid #e2e8f0; font-size: 12px; }
        td { padding: 15px; border: 1px solid #e2e8f0; text-align: center; font-weight: 600; }
        
        .row-operator { background: #ecfdf5; color: #065f46; font-weight: 800; }

        /* HISTORY */
        .history-box { margin-top: 40px; border-top: 1px solid #1e293b; padding-top: 20px; }
        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .history-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            cursor: pointer;
        }
        .history-item:hover { border-color: var(--primary-green); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-wrapper { margin-left: 0; width: 100%; }
            .grid-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">POWER</div>
        <nav>
            <a href="#" class="nav-link"><i>🏠</i> Dashboard Absensi</a>
            <a href="#" class="nav-link active"><i>📝</i> Atur Jobdesk</a>
            <a href="#" class="nav-link"><i>📊</i> Laporan Harian</a>
            <a href="#" class="nav-link"><i>⚙️</i> Pengaturan</a>
            <a href="#" class="nav-link" style="margin-top: 50px; color: #ef4444;"><i>🚪</i> Logout</a>
        </nav>
    </div>

    <div class="main-wrapper">
        <div class="header-banner">
            <h1>MANAGEMENT JOBDESK TVTOTO</h1>
            <p id="currentDate"></p>
        </div>

        <div class="input-card" style="margin-bottom: 20px;">
            <label>Pilih Shift Kerja</label>
            <select id="shiftSelect">
                <option value="PAGI">SHIFT PAGI</option>
                <option value="SORE">SHIFT SORE</option>
                <option value="MALAM">SHIFT MALAM</option>
            </select>
        </div>

        <div class="grid-inputs">
            <div class="input-card">
                <label>👥 Daftar Personel (Baris 1 = Operator)</label>
                <textarea id="staffInput" placeholder="Masukkan nama per baris...">RADO DINATA
IRVAN GANESHA
JOSIA ROMANDA GINTING
MUHAMMAD BAKRON
JANNIFER MENTARI
CINDY NURUL</textarea>
            </div>
            <div class="input-card">
                <label>💼 Daftar Jobdesk (Akan Diacak)</label>
                <textarea id="jobInput" placeholder="Masukkan tugas per baris...">DEPO BRI, BNI
DEPO MANUAL, OGL
WD MANDIRI, BNI
SCATER
WD DANA
WD MANUAL</textarea>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-gen" onclick="generateJobdesk()">🎲 Acak & Simpan</button>
            <button class="btn btn-copy" onclick="copyTableImage()">📋 Copy Gambar</button>
            <button class="btn btn-save" onclick="downloadTableImage()">📸 Simpan PNG</button>
        </div>

        <div id="captureArea">
            <div class="table-header">
                <h2>LAPORAN PEMBAGIAN TUGAS</h2>
                <div id="dateDisp" style="font-weight: 700; color: #64748b; margin-top: 5px;"></div>
                <div class="shift-tag" id="shiftDisp">SHIFT PAGI</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>NAMA PERSONEL</th>
                        <th>TUGAS OPERASIONAL</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    </tbody>
            </table>
        </div>

        <div class="history-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="font-size: 14px; color: var(--primary-green);">🕒 Riwayat Penugasan (Lokal)</h3>
                <button onclick="clearHistory()" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:11px; font-weight:700;">HAPUS SEMUA</button>
            </div>
            <div id="historyGrid" class="history-grid"></div>
        </div>
    </div>

    <script>
        // Set Tanggal
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const today = new Date().toLocaleDateString('id-ID', options);
        document.getElementById('currentDate').innerText = today;
        document.getElementById('dateDisp').innerText = today;

        let history = JSON.parse(localStorage.getItem('tvtoto_history')) || [];

        function generateJobdesk() {
            const staff = document.getElementById('staffInput').value.split('\n').filter(s => s.trim() !== "");
            const jobs = document.getElementById('jobInput').value.split('\n').filter(j => j.trim() !== "");
            const shift = document.getElementById('shiftSelect').value;

            if (staff.length === 0) return alert("Daftar personel kosong!");

            document.getElementById('shiftDisp').innerText = "SHIFT " + shift;

            const operator = staff[0];
            const regularStaff = staff.slice(1);
            const shuffledJobs = [...jobs].sort(() => Math.random() - 0.5);

            const results = [{ name: operator, job: "OPERATOR" }];
            
            regularStaff.forEach((name, index) => {
                results.push({
                    name: name,
                    job: shuffledJobs[index] || "CADANGAN"
                });
            });

            renderTable(results);
            saveToHistory(results, shift);
        }

        function renderTable(data) {
            const body = document.getElementById('resultBody');
            body.innerHTML = "";
            data.forEach(item => {
                const isOp = item.job === "OPERATOR";
                body.innerHTML += `
                    <tr class="${isOp ? 'row-operator' : ''}">
                        <td>${item.name.toUpperCase()}</td>
                        <td>${item.job.toUpperCase()}</td>
                    </tr>
                `;
            });
        }

        function saveToHistory(data, shift) {
            const entry = {
                id: Date.now(),
                shift: shift,
                time: new Date().toLocaleTimeString('id-ID'),
                data: data
            };
            history.unshift(entry);
            if(history.length > 8) history.pop();
            localStorage.setItem('tvtoto_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyGrid');
            container.innerHTML = history.length === 0 ? "<p style='font-size:12px; color:gray;'>Belum ada riwayat.</p>" : 
            history.map(h => `
                <div class="history-item" onclick="loadHistory(${h.id})">
                    <div style="font-weight:800; color:var(--primary-green);">${h.shift}</div>
                    <div style="font-size:10px; color:var(--text-muted);">${h.time}</div>
                </div>
            `).join('');
        }

        function loadHistory(id) {
            const item = history.find(h => h.id === id);
            if(item) {
                document.getElementById('shiftDisp').innerText = "SHIFT " + item.shift;
                renderTable(item.data);
            }
        }

        function clearHistory() {
            if(confirm("Hapus semua riwayat?")) {
                history = [];
                localStorage.removeItem('tvtoto_history');
                renderHistory();
            }
        }

        async function copyTableImage() {
            const area = document.getElementById('captureArea');
            const canvas = await html2canvas(area, { scale: 2 });
            canvas.toBlob(blob => {
                const item = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([item]);
                alert("Gambar berhasil di-copy!");
            });
        }

        function downloadTableImage() {
            const area = document.getElementById('captureArea');
            html2canvas(area, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Jobdesk_TVTOTO_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Inisialisasi awal
        renderHistory();
        generateJobdesk();
    </script>
</body>
</html>
