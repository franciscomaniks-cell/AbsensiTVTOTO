<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TVTOTO - Jobdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="dash-tag">DASHBOARD</div></div>
            <nav class="nav-menu">
                <div class="nav-item" onclick="location.href='index.html'">🏠 Home / Absensi</div>
                <div class="nav-item active">📝 Atur Jobdesk</div>
                <div class="nav-spacer"></div>
                <div class="nav-item logout" onclick="logout()">🚪 Logout</div>
            </nav>
        </aside>
        <main class="main-content">
            <div class="job-card">
                <h2>PENGACAK JOBDESK OPERASIONAL</h2>
                <div class="job-inputs">
                    <div>
                        <label>Daftar Nama Staff</label>
                        <textarea id="staffList" placeholder="Masukkan nama (1 baris 1 nama)"></textarea>
                    </div>
                    <div>
                        <label>Daftar Tugas</label>
                        <textarea id="taskList" placeholder="Masukkan tugas (1 baris 1 tugas)"></textarea>
                    </div>
                </div>
                <button class="btn btn-blue" style="width:100%; margin-top:15px;" onclick="generateJobs()">🎲 ACAK & SIMPAN</button>
                <div id="jobResults" style="margin-top:20px;"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
