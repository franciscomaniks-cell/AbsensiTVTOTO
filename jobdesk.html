<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POWER - Atur Jobdesk TVTOTO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #121520;
            --main-bg: #0b0e14;
            --card-bg: #1a1f2b;
            --primary-green: #22c55e;
            --accent-gold: #f59e0b;
            --danger-red: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-light);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR STYLE */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header {
            padding: 30px 25px;
            font-size: 24px;
            font-weight: 900;
            color: #facc15; /* Power Gold */
            letter-spacing: 2px;
        }

        .nav-menu {
            flex-grow: 1;
            padding: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: 0.3s;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-item i { margin-right: 15px; font-style: normal; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active {
            background: linear-gradient(90deg, #22c55e33 0%, transparent 100%);
            color: var(--primary-green);
            border-left: 4px solid var(--primary-green);
        }

        /* MAIN CONTENT */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary-green) 0%, #15803d 100%);
            color: #000;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2);
        }

        .page-header h1 { margin: 0; font-size: 24px; font-weight: 800; text-transform: uppercase; }
        
        /* CARD SYSTEM */
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-bottom: 10px; font-size: 12px; font-weight: 700; color: var(--primary-green); text-transform: uppercase; }

        textarea, select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea { height: 150px; resize: none; }

        /* BUTTONS */
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        button {
            padding: 15px; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 700; text-transform: uppercase; transition: 0.2s;
        }
        .btn-generate { background: #fff; color: #000; }
        .btn-copy { background: var(--accent-gold); color: #fff; }
        .btn-png { background: var(--primary-green); color: #000; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* TABLE AREA */
        #captureArea { background: white; padding: 40px; border-radius: 10px; color: #1e293b; }
        .report-title { text-align: center; border-bottom: 2px solid var(--primary-green); padding-bottom: 15px; margin-bottom: 20px; }
        .report-title h2 { margin: 0; color: #0f172a; font-size: 20px; }
        .shift-label { font-size: 22px; font-weight: 900; color: #15803d; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 12px; border: 1px solid #e2e8f0; font-size: 11px; }
        td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; font-weight: 600; font-size: 14px; }
        .row-op { background: #dcfce7; color: #166534; font-weight: 800; }
        .row-alt { background: #fff1f2; }

        /* HISTORY */
        .history-section { margin-top: 40px; }
        .history-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-del-all { background: var(--danger-red); color: white; padding: 5px 15px; font-size: 11px; border-radius: 5px; }
        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .history-card { background: var(--card-bg); padding: 15px; border-radius: 10px; cursor: pointer; border: 1px solid #334155; }
        .history-card:hover { border-color: var(--primary-green); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">POWER</div>
        <nav class="nav-menu">
            <a href="#" class="nav-item"><i>🏠</i> Dashboard Absensi</a>
            <a href="#" class="nav-item active"><i>📝</i> Atur Jobdesk</a>
            <a href="#" class="nav-item"><i>📊</i> Laporan Harian</a>
            <a href="#" class="nav-item"><i>⚙️</i> Pengaturan</a>
        </nav>
        <div style="padding: 20px;">
            <a href="#" class="nav-item" style="color: var(--danger-red);"><i>🚪</i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>SISTEM ATUR JOBDESK TVTOTO</h1>
            <div id="topDate" style="font-weight: 700; margin-top: 5px; opacity: 0.8;"></div>
        </div>

        <div class="card">
            <label>Pilih Shift Operasional</label>
            <select id="shiftSelect">
                <option value="PAGI">SHIFT PAGI</option>
                <option value="SORE">SHIFT SORE</option>
                <option value="MALAM">SHIFT MALAM</option>
            </select>
        </div>

        <div class="input-grid">
            <div class="card">
                <label>👥 Daftar Personel (Atas = Operator)</label>
                <textarea id="staffInput">RADO DINATA
IRVAN GANESHA
JOSIA ROMANDA GINTING
MUHAMMAD BAKRON
JANNIFER MENTARI
CINDY NURUL
SENDI REVIAN
SYUKUR KURNIAWAN
HARYATI DEWI</textarea>
            </div>
            <div class="card">
                <label>💼 Daftar Jobdesk</label>
                <textarea id="jobInput">DEPO BRI, BNI
DEPO MANUAL, OGL
DEPO DANA, SCATTER
WD BCA, BRI
WD MANDIRI, BNI
SCATER
WD DANA
WD MANUAL, SEABANK</textarea>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-generate" onclick="generateJobdesk()">🎲 Acak & Simpan</button>
            <button class="btn-copy" onclick="copyToClipboard()">📋 Copy Gambar</button>
            <button class="btn-png" onclick="downloadImage()">📸 Simpan PNG</button>
        </div>

        <div id="captureArea">
            <div class="report-title">
                <h2>LAPORAN PEMBAGIAN TUGAS</h2>
                <div class="shift-label" id="shiftDisp">SHIFT PAGI</div>
                <div id="tableDate" style="font-weight: 700; color: #475569;"></div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th width="50%">NAMA PERSONEL</th>
                        <th width="50%">TUGAS OPERASIONAL</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>

        <div class="history-section">
            <div class="history-top">
                <h3 style="margin:0; font-size: 14px;">🕒 Riwayat Penugasan (Lokal)</h3>
                <button class="btn-del-all" onclick="clearHistory()">HAPUS SEMUA</button>
            </div>
            <div id="historyGrid" class="history-grid"></div>
        </div>
    </div>

    <script>
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const today = new Date().toLocaleDateString('id-ID', dateOptions);
        document.getElementById('topDate').innerText = today;
        document.getElementById('tableDate').innerText = today;

        let historyData = JSON.parse(localStorage.getItem('power_jobdesk_v3')) || [];

        function generateJobdesk() {
            const shift = document.getElementById('shiftSelect').value;
            document.getElementById('shiftDisp').innerText = "SHIFT " + shift;

            const staff = document.getElementById('staffInput').value.split('\n').filter(n => n.trim() !== "");
            const jobs = document.getElementById('jobInput').value.split('\n').filter(j => j.trim() !== "");

            if(staff.length === 0) return alert("Isi nama staff!");

            const opName = staff[0];
            const others = staff.slice(1);
            const shuffledJobs = [...jobs].sort(() => Math.random() - 0.5);

            const finalData = [{ name: opName, job: "OPERATOR" }];
            others.forEach((name, i) => {
                finalData.push({ name, job: shuffledJobs[i] || "CADANGAN" });
            });

            renderTable(finalData);
            saveData(finalData, shift);
        }

        function renderTable(data) {
            const body = document.getElementById('resultBody');
            body.innerHTML = "";
            data.forEach((item, i) => {
                const isOp = item.job === "OPERATOR";
                const rowClass = isOp ? "row-op" : (i % 2 !== 0 ? "row-alt" : "");
                body.innerHTML += `<tr class="${rowClass}"><td>${item.name.toUpperCase()}</td><td>${item.job.toUpperCase()}</td></tr>`;
            });
        }

        function saveData(data, shift) {
            const entry = { id: Date.now(), shift, date: today, time: new Date().toLocaleTimeString('id-ID'), assignments: data };
            historyData.unshift(entry);
            if(historyData.length > 10) historyData.pop();
            localStorage.setItem('power_jobdesk_v3', JSON.stringify(historyData));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyGrid');
            container.innerHTML = historyData.length === 0 ? "<p style='font-size:12px; color:gray;'>Kosong.</p>" : 
            historyData.map(item => `
                <div class="history-card" onclick="loadHistory(${item.id})">
                    <div style="color:var(--primary-green); font-weight:800; font-size:12px;">${item.shift}</div>
                    <div style="font-size:10px; color:var(--text-muted);">${item.time}</div>
                </div>
            `).join('');
        }

        function loadHistory(id) {
            const item = historyData.find(h => h.id === id);
            if(item) {
                document.getElementById('shiftDisp').innerText = "SHIFT " + item.shift;
                renderTable(item.assignments);
            }
        }

        function clearHistory() {
            if(confirm("Hapus semua riwayat?")) {
                historyData = [];
                localStorage.removeItem('power_jobdesk_v3');
                renderHistory();
            }
        }

        async function copyToClipboard() {
            const canvas = await html2canvas(document.getElementById('captureArea'), { scale: 2 });
            canvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                alert("Berhasil disalin ke clipboard!");
            });
        }

        function downloadImage() {
            html2canvas(document.getElementById('captureArea'), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Jobdesk_TVTOTO_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        renderHistory();
        generateJobdesk();
    </script>
</body>
</html>
