<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TVTOTO - Atur Jobdesk</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="dash-label">DASHBOARD</div></div>
            <nav class="side-nav">
                <div class="nav-item" onclick="location.href='index.html'">🏠 Home / Absensi</div>
                <div class="nav-item active">📝 Atur Jobdesk</div>
                <div class="nav-spacer"></div>
                <div class="nav-item logout-link" onclick="logout()">🚪 Logout</div>
            </nav>
        </aside>

        <main class="main-screen">
            <div class="jobdesk-container">
                <div class="header-job">
                    <h1>JOBDESK STAFF TVTOTO</h1>
                    <p id="jobDate">21 Februari 2026</p>
                </div>

                <div class="job-config-grid">
                    <div class="config-box">
                        <label>PILIH SHIFT KERJA</label>
                        <select id="jShift">
                            <option>Shift PAGI</option>
                            <option>Shift SORE</option>
                            <option>Shift MALAM</option>
                        </select>
                    </div>

                    <div class="input-row">
                        <div class="config-box">
                            <label>DAFTAR STAFF (BARIS 1 = OPERATOR)</label>
                            <textarea id="staffList" placeholder="Contoh: RADO DINATA..."></textarea>
                        </div>
                        <div class="config-box">
                            <label>DAFTAR JOBDESK</label>
                            <textarea id="taskList" placeholder="Contoh: DEPO BRI, BNI..."></textarea>
                        </div>
                    </div>

                    <div class="job-actions">
                        <button class="btn btn-white" onclick="generateJobs()">🎲 ACAK & SIMPAN</button>
                        <button class="btn btn-orange" onclick="copyTable()">📋 COPY GAMBAR</button>
                        <button class="btn btn-green" onclick="saveAsImage()">📸 SIMPAN PNG</button>
                    </div>
                </div>

                <div id="reportArea" class="report-card">
                    <h2>LAPORAN PEMBAGIAN TUGAS</h2>
                    <h3 id="repShift">SHIFT PAGI</h3>
                    <div id="jobTableResult"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
